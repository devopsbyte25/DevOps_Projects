services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: flask-docker-cicd-demo:local
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - APP_VERSION=local-dev
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
