name: CI - 01 Automated Backup

on:
  push:
    branches: [main]
    paths:
      - '01-automated_backup/**'   # only triggers on changes to this folder
  pull_request:
    branches: [main]
    paths:
      - '01-automated_backup/**'
      - '.github/workflows/ci-01-automated_backup.yml'

jobs:
  lint:
    name: Shell lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint all scripts
        run: |
          shellcheck 01-automated_backup/scripts/backup.sh \
                     01-automated_backup/scripts/install_cron.sh \
                     01-automated_backup/tests/test_backup.sh

  test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Make scripts executable
        run: chmod +x 01-automated_backup/scripts/*.sh 01-automated_backup/tests/*.sh
      - name: Run test suite
        run: bash 01-automated_backup/tests/test_backup.sh