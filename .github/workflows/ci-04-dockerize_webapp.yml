name: CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------
  # 1) Continuous Integration: lint + unit tests on every push and PR
  # ---------------------------------------------------------------------
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: flake8 app tests wsgi.py

      - name: Run tests with coverage
        run: pytest --cov=app -v

  # ---------------------------------------------------------------------
  # 2) Continuous Delivery: build the Docker image and push it to GHCR.
  #    Only runs on pushes to main or version tags (not on PRs).
  # ---------------------------------------------------------------------
  build-and-push:
    name: Build & Push Image
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Optional: also push the same image to Docker Hub.
      # Add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN as repo secrets to enable.
      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/flask-docker-cicd-demo', secrets.DOCKERHUB_USERNAME) || '' }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed image with digest ${{ steps.meta.outputs.tags }}"

  # ---------------------------------------------------------------------
  # 3) Optional deploy stage — only fires on version tags (releases).
  #    Replace the placeholder step with your real deploy mechanism
  #    (SSH + docker compose pull, Kubernetes rollout, ECS update, etc.)
  # ---------------------------------------------------------------------
  deploy:
    name: Deploy (placeholder)
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy notification
        run: |
          echo "Would deploy tag ${{ github.ref_name }} now."
          echo "Hook this step up to SSH, kubectl, ECS, etc."
